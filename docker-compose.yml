version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./public:/app/public
      - benefit-data:/app/data
    environment:
      NODE_ENV: development
    # Optionally, mount source for live reload (if supported)
    # - .:/app
    # command: npm run dev
volumes:
  benefit-data:
